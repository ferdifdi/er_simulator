<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ER Triage Simulator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      background: #fff;
      color: #111;
      padding: 28px 32px;
      max-width: 1100px;
    }

    header {
      margin-bottom: 28px;
      border-bottom: 2px solid #111;
      padding-bottom: 12px;
    }

    header h1 {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    header p {
      font-size: 12px;
      color: #888;
      margin-top: 3px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      margin-top: 28px;
    }

    section { margin-bottom: 32px; }

    h2 {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #888;
      margin-bottom: 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    th {
      text-align: left;
      padding: 6px 10px;
      font-size: 11px;
      font-weight: 600;
      color: #555;
      border-bottom: 1px solid #ddd;
      background: #fafafa;
    }

    td {
      padding: 7px 10px;
      border-bottom: 1px solid #f0f0f0;
      vertical-align: middle;
    }

    tbody tr:hover td { background: #f8f8f8; }

    .esi1 { color: #c0392b; font-weight: 700; }
    .esi2 { color: #e67e22; font-weight: 600; }
    .esi3 { color: #b8860b; }
    .esi4 { color: #27ae60; }
    .esi5 { color: #999; }

    .room-available { color: #27ae60; font-weight: 600; }
    .room-occupied  { color: #2471a3; font-weight: 600; }
    .room-cleaning  { color: #888; }

    .empty {
      color: #aaa;
      font-style: italic;
      padding: 14px 10px;
      font-size: 12px;
    }

    .updated {
      font-size: 11px;
      color: #bbb;
      margin-top: 6px;
      text-align: right;
    }

    /* Admit form */
    form {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: flex-end;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .field label {
      font-size: 11px;
      font-weight: 600;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    input, select {
      padding: 6px 8px;
      border: 1px solid #ccc;
      border-radius: 0;
      font-size: 13px;
      font-family: inherit;
      background: #fff;
      color: #111;
      outline: none;
    }

    input:focus, select:focus { border-color: #111; }

    input[type="number"] { width: 70px; }

    button {
      padding: 7px 16px;
      background: #111;
      color: #fff;
      border: none;
      font-size: 13px;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.02em;
    }

    button:hover { background: #333; }
    button:active { background: #000; }

    #admit-msg {
      font-size: 12px;
      color: #555;
      margin-top: 8px;
      min-height: 18px;
    }

    #admit-msg.ok  { color: #27ae60; }
    #admit-msg.err { color: #c0392b; }

    @media (max-width: 680px) {
      .grid { grid-template-columns: 1fr; }
      body  { padding: 16px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>ER Triage Simulator</h1>
    <p>Live dashboard &mdash; auto-refreshes every 4 seconds</p>
  </header>

  <section>
    <h2>Admit Patient</h2>
    <form id="admit-form">
      <div class="field">
        <label for="name">Name</label>
        <input id="name" type="text" placeholder="Full name" required>
      </div>
      <div class="field">
        <label for="age">Age</label>
        <input id="age" type="number" min="0" max="130" placeholder="0" required>
      </div>
      <div class="field">
        <label for="level">Triage Level</label>
        <select id="level">
          <option value="ESI_1_IMMEDIATE">ESI 1 — Immediate</option>
          <option value="ESI_2_EMERGENT">ESI 2 — Emergent</option>
          <option value="ESI_3_URGENT" selected>ESI 3 — Urgent</option>
          <option value="ESI_4_LESS_URGENT">ESI 4 — Less Urgent</option>
          <option value="ESI_5_NON_URGENT">ESI 5 — Non-Urgent</option>
        </select>
      </div>
      <button type="submit">Admit</button>
    </form>
    <div id="admit-msg"></div>
  </section>

  <div class="grid">
    <section>
      <h2>Waiting Queue</h2>
      <table id="queue-table">
        <thead>
          <tr>
            <th>Name</th>
            <th>Age</th>
            <th>ESI Level</th>
            <th>Arrived</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
      <div class="updated" id="queue-ts"></div>
    </section>

    <section>
      <h2>Treatment Rooms</h2>
      <table id="rooms-table">
        <thead>
          <tr>
            <th>Room</th>
            <th>Status</th>
            <th>Patient</th>
            <th>Doctor</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
      <div class="updated" id="rooms-ts"></div>
    </section>
  </div>

  <script>
    const ESI_LABEL = {
      ESI_1_IMMEDIATE:  'ESI 1 — Immediate',
      ESI_2_EMERGENT:   'ESI 2 — Emergent',
      ESI_3_URGENT:     'ESI 3 — Urgent',
      ESI_4_LESS_URGENT:'ESI 4 — Less Urgent',
      ESI_5_NON_URGENT: 'ESI 5 — Non-Urgent',
    };

    const ESI_CLASS = {
      ESI_1_IMMEDIATE:  'esi1',
      ESI_2_EMERGENT:   'esi2',
      ESI_3_URGENT:     'esi3',
      ESI_4_LESS_URGENT:'esi4',
      ESI_5_NON_URGENT: 'esi5',
    };

    function fmt(s) {
      if (!s) return '—';
      return s.replace(/_/g, ' ')
              .toLowerCase()
              .replace(/\b\w/g, c => c.toUpperCase());
    }

    function timeOf(iso) {
      if (!iso) return '—';
      return new Date(iso).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }

    function stamp() {
      return 'Updated ' + new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }

    function roomClass(status) {
      if (status === 'AVAILABLE') return 'room-available';
      if (status === 'OCCUPIED')  return 'room-occupied';
      return 'room-cleaning';
    }

    async function loadQueue() {
      const tbody = document.querySelector('#queue-table tbody');
      try {
        const res = await fetch('/queue');
        const data = await res.json();
        tbody.innerHTML = '';
        if (!data.length) {
          tbody.innerHTML = '<tr><td colspan="4" class="empty">No patients waiting</td></tr>';
        } else {
          data.forEach(p => {
            const tr = document.createElement('tr');
            tr.innerHTML =
              `<td>${p.name || '—'}</td>` +
              `<td>${p.age != null ? p.age : '—'}</td>` +
              `<td class="${ESI_CLASS[p.triageLevel] || ''}">${ESI_LABEL[p.triageLevel] || p.triageLevel || '—'}</td>` +
              `<td>${timeOf(p.arrivalTime)}</td>`;
            tbody.appendChild(tr);
          });
        }
        document.getElementById('queue-ts').textContent = stamp();
      } catch (_) {
        tbody.innerHTML = '<tr><td colspan="4" class="empty">Could not reach server</td></tr>';
      }
    }

    async function loadRooms() {
      const tbody = document.querySelector('#rooms-table tbody');
      try {
        const res = await fetch('/rooms');
        const data = await res.json();
        tbody.innerHTML = '';
        if (!data.length) {
          tbody.innerHTML = '<tr><td colspan="4" class="empty">No rooms configured</td></tr>';
        } else {
          data.forEach(r => {
            const tr = document.createElement('tr');
            tr.innerHTML =
              `<td>${r.roomId || '—'}</td>` +
              `<td class="${roomClass(r.status)}">${fmt(r.status)}</td>` +
              `<td>${r.currentPatientName || '—'}</td>` +
              `<td>${r.doctorName || '—'}</td>`;
            tbody.appendChild(tr);
          });
        }
        document.getElementById('rooms-ts').textContent = stamp();
      } catch (_) {
        tbody.innerHTML = '<tr><td colspan="4" class="empty">Could not reach server</td></tr>';
      }
    }

    document.getElementById('admit-form').addEventListener('submit', async e => {
      e.preventDefault();
      const msg = document.getElementById('admit-msg');
      msg.className = '';
      msg.textContent = 'Admitting…';

      const body = {
        patientId:   crypto.randomUUID(),
        name:        document.getElementById('name').value.trim(),
        age:         parseInt(document.getElementById('age').value, 10),
        triageLevel: document.getElementById('level').value,
      };

      try {
        const res = await fetch('/patients', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify(body),
        });
        if (res.ok) {
          const p = await res.json();
          msg.className = 'ok';
          msg.textContent = `Admitted: ${p.name}, ${ESI_LABEL[p.triageLevel] || p.triageLevel}`;
          document.getElementById('name').value = '';
          document.getElementById('age').value  = '';
          loadQueue();
        } else {
          msg.className = 'err';
          msg.textContent = `Error ${res.status}: ${res.statusText}`;
        }
      } catch (err) {
        msg.className = 'err';
        msg.textContent = 'Network error — ' + err.message;
      }
    });

    loadQueue();
    loadRooms();
    setInterval(loadQueue, 4000);
    setInterval(loadRooms, 4000);
  </script>
</body>
</html>
