# ============================================================
# ER Triage Simulator - Application Configuration
# TODO #Sruthi: tune properties as needed during integration
# ============================================================

spring.application.name=ER Triage Simulator
server.port=8080

# H2 In-Memory Database
spring.datasource.url=jdbc:h2:mem:ersim
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Simulator runtime
ersim.rooms.count=4
ersim.simulation.autostart=true
ersim.arrival.intervalMs=2000
